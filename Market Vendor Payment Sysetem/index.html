<!DOCTYPE html>
<html>
<head>
    <title>Market Vendor Payment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container mt-4">

<h1 class="text-center">Market Vendor Payment Management System</h1>

<!-- LOGIN -->
<div id="loginSection">
    <div class="card">
        <h4>Admin Login</h4>
        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100">Login</button>
        <p class="copyright-text mt-3 text-center">
    All Rights Reserved. © Copyrights by Opio Fred Inc
</p>
    </div>
</div>

<!-- MAIN SYSTEM -->
<div id="mainSection" style="display:none;">

<button onclick="logout()" class="btn btn-danger float-end">Logout</button>

<!-- DASHBOARD -->
<div class="card p-3 mt-4">
    <h4>Dashboard</h4>
    <p>Total Vendors: <span id="totalVendors"></span></p>
    <p>Total Payments Recorded: <span id="totalPayments"></span></p>

    <button onclick="downloadPaid()" class="btn btn-success mt-2">Download Paid Vendors</button>
    <button onclick="downloadUnpaid()" class="btn btn-warning mt-2">Download Unpaid Vendors</button>
    <button onclick="downloadAllPayments()" class="btn btn-info mt-2">Download Payment History</button>
</div>

<button onclick="clearAll()" class="btn btn-danger mt-3">Clear ALL Records</button>

<!-- ADD / UPDATE VENDOR -->
<div class="card p-3 mt-4">
    <h4>Add / Update Vendor</h4>
    <input type="hidden" id="editIndex">
    <input id="vName" class="form-control mb-2" placeholder="Vendor Name">
    <input id="vPhone" class="form-control mb-2" placeholder="Phone">
    <input id="vStall" class="form-control mb-2" placeholder="Stall">
    <input id="vGoods" class="form-control mb-2" placeholder="Goods Type">
    <input id="vFee" type="number" class="form-control mb-2" placeholder="Monthly Fee">
    <button onclick="saveVendor()" class="btn btn-success">Save Vendor</button>
</div>

<input onkeyup="searchVendor()" id="search" class="form-control mt-3" placeholder="Search Vendor">

<div class="card p-3 mt-3">
<table class="table table-bordered">
<thead>
<tr>
<th>Name</th><th>Fee</th><th>Paid</th><th>Balance</th><th>Edit</th><th>Delete</th>
</tr>
</thead>
<tbody id="vendorTable"></tbody>
</table>
</div>

<!-- RECORD PAYMENT -->
<div class="card p-3 mt-4">
<h4>Record Payment</h4>
<select id="vendorSelect" class="form-control mb-2"></select>
<input id="paymentAmount" type="number" class="form-control mb-2" placeholder="Amount">
<input id="paymentDate" type="date" class="form-control mb-2">
<button onclick="addPayment()" class="btn btn-primary">Record Payment</button>
</div>

<!-- PAYMENT HISTORY -->
<div class="card p-3 mt-4">
<h4>Payment History</h4>
<table class="table table-bordered">
<thead>
<tr><th>Vendor</th><th>Amount</th><th>Date</th></tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
